<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Бронирование авиабилетов | Регистрация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <link rel="stylesheet" th:href="@{/css/register_form.css}" />
</head>
<body>
<!-- Навигация -->
<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">Поиск авиабилетов</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
              aria-expanded="false" aria-label="Переключатель навигации">
        <span class="navbar-toggler-icon"></span>
      </button>
      <!-- Пустая навигация, чтобы не мешало -->
    </div>
  </nav>
</header>

<!-- Основной контент -->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <h1 class="text-center mb-4">Регистрация</h1>

      <form th:action="@{/register}" th:object="${user}" method="post" class="register-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="mb-3">
          <label for="username" class="form-label">Имя пользователя</label>
          <input type="text" id="username" th:field="*{username}" class="form-control" required />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Пароль</label>
          <input type="password" id="password" th:field="*{password}" class="form-control" required />
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-dark btn-lg">Зарегистрироваться</button>
        </div>
      </form>

      <p class="mt-3 text-center">
        <a th:hx-get="@{'/login'}" hx-target="#dialog3" hx-trigger="click" class="text-dark link-login">
          Уже есть аккаунт? Войти
        </a>
      </p>
    </div>
  </div>
</div>

<!-- Модальное окно входа -->
<div class="modal fade" id="modallog" tabindex="-1" aria-labelledby="exampleModalLabellog" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="exampleModalLabellog">Вход</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="dialog3">
        <!-- Форма будет загружена сюда -->
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/htmx.org@1.6.1/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
<script src="/dialog3.js"></script>
</body>
</html>
