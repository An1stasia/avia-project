<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | Авиабилеты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/register.css}" />
</head>
<body>

<header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">✈ Поиск авиабилетов</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Переключатель навигации">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="navbar-collapse collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li sec:authorize="isAnonymous()">
                        <a th:hx-get="@{'/login'}" hx-target="#dialog3" class="btn nav-link custom-button">Войти</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<div class="register-wrapper">
    <div class="register-card">
        <h1 class="register-title">Регистрация</h1>

        <form th:action="@{/register}" th:object="${user}" method="post" class="register-form">

            <div class="form-section-title">Учётная запись</div>
            <div class="mb-3">
                <label for="username" class="form-label">Имя пользователя</label>
                <input type="text" id="username" th:field="*{username}" class="form-control" required />
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" id="password" th:field="*{password}" class="form-control" required />
            </div>

            <div class="form-section-title">Данные пассажира</div>
            <div class="row">
                <div class="col-sm-6 mb-3">
                    <label for="last_nm" class="form-label">Фамилия</label>
                    <input type="text" id="last_nm" th:field="*{passenger.last_nm}" class="form-control" required />
                </div>
                <div class="col-sm-6 mb-3">
                    <label for="fst_nm" class="form-label">Имя</label>
                    <input type="text" id="fst_nm" th:field="*{passenger.fst_nm}" class="form-control" required />
                </div>
            </div>
            <div class="mb-3">
                <label for="mid_nm" class="form-label">Отчество</label>
                <input type="text" id="mid_nm" th:field="*{passenger.mid_nm}" class="form-control" />
            </div>
            <div class="row">
                <div class="col-sm-6 mb-3">
                    <label for="birth_date" class="form-label">Дата рождения</label>
                    <input type="date" id="birth_date" th:field="*{passenger.birth_date}" class="form-control" required />
                </div>
                <div class="col-sm-6 mb-3">
                    <label for="phone" class="form-label">Телефон</label>
                    <input type="tel" id="phone" th:field="*{passenger.phone}" class="form-control" placeholder="+7 (___) ___-__-__" />
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Почта</label>
                <input type="email" id="email" th:field="*{passenger.email}" class="form-control" required />
            </div>
            <div class="mb-3">
                <label for="passport" class="form-label">Паспорт</label>
                <input type="text" id="passport" th:field="*{passenger.passport}" class="form-control" placeholder="1234567890" required />
            </div>

            <div class="d-grid mt-4">
                <button type="submit" class="btn-register">Зарегистрироваться</button>
            </div>
        </form>

        <a th:hx-get="@{'/login'}" hx-target="#dialog3" hx-trigger="click" class="btn-outline-link">
            Уже есть аккаунт? Войти
        </a>
    </div>
</div>

<div class="modal fade" id="modallog" tabindex="-1" aria-labelledby="exampleModalLabellog" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabellog">Вход</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="dialog3">
                <!-- Форма -->
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/htmx.org@1.6.1/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
<script src="/dialog3.js"></script>
</body>
</html>
