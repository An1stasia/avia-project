<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Бронирование авиабилетов | Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<h1>Личный кабинет</h1>
<p>Имя пользователя: <span th:text="${user.username}"></span></p>

<!-- Блок для пользователей, у которых есть пассажир -->
<div th:if="${user.passenger != null}">
    <h3>Данные пассажира</h3>
    <p>Имя: <span th:text="${user.passenger.fst_nm}"></span></p>
    <p>Фамилия: <span th:text="${user.passenger.last_nm}"></span></p>
    <p>Отчество: <span th:text="${user.passenger.mid_nm}"></span></p>
    <p>Дата рождения: <span th:text="${#dates.format(user.passenger.birth_date, 'dd.MM.yyyy')}"></span></p>
    <p>Паспорт: <span th:text="${user.passenger.passport}"></span></p>
    <p>Телефон: <span th:text="${user.passenger.phone}"></span></p>
    <p>Почта: <span th:text="${user.passenger.email}"></span></p>
    <!-- Другие поля пассажира -->
    <a th:hx-get="@{'/passenger/edit/' + ${user.passenger.pax_id}}" hx-target="#dialog_pax2" class="btn nav-link">Редактировать данные</a>
    <div class="modal fade" id="modalpax2" tabindex="-1" aria-labelledby="ModalPax_2" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="ModalPax_2">Данные пассажира</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="dialog_pax2">
                    <!-- Форма будет загружена сюда -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Блок для пользователей без пассажира -->
<div th:unless="${user.passenger != null}">
    <p>Хотите зарегистрироваться как пассажир?
        <a th:hx-get="@{/passenger/new}" hx-target="#dialog_pax1" class="btn nav-link">Заполните форму</a>
    </p>
    <div class="modal fade" id="modalpax" tabindex="-1" aria-labelledby="ModalPax1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="ModalPax1">Данные пассажира</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="dialog_pax1">
                    <!-- Форма будет загружена сюда -->
                </div>
            </div>
        </div>
    </div>
</div>

<br/>
<a th:href="@{/}">На главную</a>
<script src="https://unpkg.com/htmx.org@1.6.1/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
<script src="/dialog_pax1.js"></script>
<script src="/dialog_pax2.js"></script>
</body>
</html>
