<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Подтверждение тарифа</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/review.css}" />
</head>
<body>
<header>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">✈ Поиск авиабилетов</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
              aria-expanded="false" aria-label="Переключатель навигации">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="navbar-collapse collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
          <li>
            <a class="nav-link" th:href="@{/personal_account}" th:text="${username}" sec:authorize="hasRole('USER')"></a>
            <span class="nav-link" th:text="${username}" sec:authorize="isAuthenticated() AND !hasRole('USER')"></span>
          </li>
          <li sec:authorize="isAnonymous()">
            <a th:hx-get="@{'/login'}" hx-target="#dialog3" class="btn nav-link custom-button">Войти</a>
          </li>
          <li class="nav-item" th:if="${#authentication != null and #authentication.isAuthenticated() and #authentication.name != 'anonymousUser'}">
            <a href="/logout" class="btn btn-danger nav-link custom-button">Выйти</a>
          </li>
          <li>
            <a class="nav-link custom-button" href="/basa" sec:authorize="hasRole('ADMIN')">Управление базой</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
<div class="dashboard-container">
  <div class="page-header">
    <h1 class="page-title">Проверка бронирования</h1>
    <div class="sub-header">Пожалуйста, проверьте детали рейса и тарифа</div>
  </div>

  <div class="confirm-card">
    <div class="details-grid">

      <div class="flight-details">
        <div class="info-row">
          <div class="info-label">Номер рейса:</div>
          <div class="info-value" th:text="${flight.flt_nbr}"></div>
        </div>

        <div class="info-row">
          <div class="info-label">Вылет (местное):</div>
          <div class="info-value">
            <span th:text="${#dates.format(flight.deptr_dttm_lcl, 'dd.MM.yyyy HH:mm')}"></span>
            <span class="utc-time" th:text="'UTC ' + ${#dates.format(flight.deptr_dttm_utc, 'HH:mm')}"></span>
          </div>
        </div>

        <div class="info-row">
          <div class="info-label">Прилёт (местное):</div>
          <div class="info-value">
            <span th:text="${#dates.format(flight.arvl_dttm_lcl, 'dd.MM.yyyy HH:mm')}"></span>
            <span class="utc-time" th:text="'UTC ' + ${#dates.format(flight.arvl_dttm_utc, 'HH:mm')}"></span>
          </div>
        </div>

        <div class="airport-group">
          <div class="airport-item">
            <div class="airport-iata" th:text="${flight.deptrAirports.aipName}">SVO</div>
            <div class="airport-name" th:text="${flight.deptrAirports.city_rus} + ' (' + ${flight.deptrAirports.aipName} + ')'">Москва (Шереметьево)</div>
          </div>
          <div class="airport-item">
            <div class="airport-iata" th:text="${flight.arvlAirports.aipName}">LED</div>
            <div class="airport-name" th:text="${flight.arvlAirports.city_rus} + ' (' + ${flight.arvlAirports.aipName} + ')'">Санкт-Петербург (Пулково)</div>
          </div>
        </div>

      <div class="fare-details">
        <div class="fare-class">
          <span th:text="${cost.cls == 'C' ? 'Бизнес' : (cost.cls == 'Y' ? 'Эконом' : (cost.cls == 'W' ? 'Комфорт' : cost.cls))}"></span>
        </div>
        <div class="fare-price">
          <span th:text="${cost.cost}"></span> <small>₽</small>
        </div>
        <div class="text-muted small">за одного пассажира</div>
      </div>
    </div>
  </div>

  <div class="action-buttons">
    <form th:action="@{/coupon/create}" method="post" style="display: inline;">
      <input type="hidden" name="fltId" th:value="${flight.flt_id}"/>
      <input type="hidden" name="costId" th:value="${cost.cost_id}"/>
      <button type="submit" class="btn-primary-custom">
        Перейти к оформлению купона
      </button>
    </form>
    <button onclick="history.back()" class="btn-secondary-custom">Вернуться к поиску</button>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/htmx.org@1.6.1/dist/htmx.min.js"></script>
</body>
</html>
