<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Проверка выбранного тарифа</title>
  <!-- Bootstrap или свои стили -->
</head>
<body>
<h2>Детали выбранного рейса и тарифа</h2>

<table>
  <tr>
    <td><strong>Номер рейса:</strong></td>
    <td th:text="${flight.flt_nbr}"></td>
  </tr>
  <tr>
    <td><strong>Дата рейса:</strong></td>
    <td th:text="${flight.flt_date}"></td>
  </tr>
  <tr>
    <td><strong>Класс:</strong></td>
    <td th:text="${cost.cls}"></td>
  </tr>
  <tr>
    <td><strong>Стоимость:</strong></td>
    <td th:text="${cost.cost} + ' ₽'"></td>
  </tr>
</table>
