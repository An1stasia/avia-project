<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Title</title>
</head>
<body>
<h2>Бронирование оформлено!</h2>
<div th:if="${tkt != null}">
  <p>Номер бронирования: <span th:text="${tkt.tkt_id}"></span></p>
  <p>Пассажир: <span th:text="${tkt.pax_tkt.last_nm} + ' ' + ${tkt.pax_tkt.fst_nm}"></span></p>
  <h3>Купоны:</h3>
  <ul>
    <li th:each="cpn : ${tkt.cpns}">
      Рейс <span th:text="${cpn.flt_cpn.flt_nbr}"></span>
      (<span th:text="${cpn.flt_cpn.deptr_dttm_lcl}"></span>),
      класс <span th:text="${cpn.cost_cpn.cls}"></span>,
      <span th:text="${cpn.cost_cpn.cost}"></span> ₽
    </li>
  </ul>
</div>
<a th:href="@{/}">На главную</a>
</body>
</html>
